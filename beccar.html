<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Beccar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; --accent: #059669;
            --text: #334155; --muted: #64748b; --border: #e2e8f0;
            --progress-bg: #f1f5f9; --falta-bg: #eff6ff; --falta-text: #1d4ed8;
        }
        body.dark-mode {
            --bg: #020617; --card: #1e293b; --primary: #f8fafc; --accent: #22c55e;
            --text: #cbd5e1; --muted: #94a3b8; --border: #334155;
            --progress-bg: #0f172a; --falta-bg: #172554; --falta-text: #93c5fd;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 900px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        select { padding: 8px; border-radius: 8px; background: var(--card); color: var(--primary); border: 1px solid var(--border); font-weight: 600; }
        .metric-row { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 20px; margin-bottom: 15px; }
        .row-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; align-items: center; }
        .label { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }
        .val { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .obj { font-size: 1.2rem; font-weight: 700; color: var(--muted); }
        .tag { padding: 6px; border-radius: 6px; text-align: center; font-weight: 700; font-size: 1rem; }
        .falta { background: var(--falta-bg); color: var(--falta-text); }
        .superado { background: var(--accent); color: #fff; }
        .bar-bg { background: var(--progress-bg); height: 8px; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .bar-fill { background: var(--accent); height: 100%; width: 0%; transition: 1s; }
        #theme-toggle { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; background: var(--primary); color: var(--card); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="title">Dashboard Beccar</h1>
        <select id="mesSelector"><option>Cargando...</option></select>
    </div>

    <div class="metric-row">
        <div class="row-grid">
            <div><span class="label">Facturación</span><div id="f-val" class="val">$ 0</div></div>
            <div style="text-align:center"><span class="label">Objetivo</span><div id="f-obj" class="obj">$ 0</div></div>
            <div style="text-align:right"><span class="label">Diferencia</span><div id="f-diff" class="tag">-</div></div>
        </div>
        <div class="bar-bg"><div id="f-bar" class="bar-fill"></div></div>
    </div>
    
    <div class="metric-row">
        <div class="row-grid">
            <div><span class="label">Neumáticos 13"+</span><div id="n13-val" class="val">0</div></div>
            <div style="text-align:center"><span class="label">Objetivo</span><div id="n13-obj" class="obj">0</div></div>
            <div style="text-align:right"><span class="label">Diferencia</span><div id="n13-diff" class="tag">-</div></div>
        </div>
        <div class="bar-bg"><div id="n13-bar" class="bar-fill"></div></div>
    </div>

    <div class="metric-row">
        <div class="row-grid">
            <div><span class="label">Neumáticos 17"+</span><div id="n17-val" class="val">0</div></div>
            <div style="text-align:center"><span class="label">Objetivo</span><div id="n17-obj" class="obj">0</div></div>
            <div style="text-align:right"><span class="label">Diferencia</span><div id="n17-diff" class="tag">-</div></div>
        </div>
        <div class="bar-bg"><div id="n17-bar" class="bar-fill"></div></div>
    </div>

    <div class="metric-row">
        <div class="row-grid">
            <div><span class="label">Servicios</span><div id="s-val" class="val">$ 0</div></div>
            <div style="text-align:center"><span class="label">Objetivo</span><div id="s-obj" class="obj">$ 0</div></div>
            <div style="text-align:right"><span class="label">Diferencia</span><div id="s-diff" class="tag">-</div></div>
        </div>
        <div class="bar-bg"><div id="s-bar" class="bar-fill"></div></div>
    </div>
</div>

<button id="theme-toggle">🌙</button>

<script>
    const SHEET_ID = '2PACX-1vSCmHe-75PjLOZxC8rj9ZiRx58SU0crBtp9FGokKFYUIN3FSONy7091EQPrVZWmHrkuXEuK-rg3uCx4';
    const GID_VENTAS = '0';
    const GID_OBJETIVOS = '257732281';
    
    // Función para armar la URL sin errores 400
    const getUrl = (gid) => `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=${gid}&output=csv`;

    let rawVentas = [];
    let metasMap = {};

    function cleanNum(v) {
        if (!v) return 0;
        return parseFloat(String(v).replace(/[$.]/g, '').replace(',', '.')) || 0;
    }

    async function cargarDatos() {
        // 1. Cargar Objetivos
        Papa.parse(getUrl(GID_OBJETIVOS), {
            download: true, header: true,
            complete: function(results) {
                results.data.forEach(row => {
                    let mes = row.Mes || row.MES;
                    if(mes) metasMap[mes.trim()] = {
                        f: cleanNum(row.Facturacion),
                        n13: cleanNum(row.Neumaticos13),
                        n17: cleanNum(row.Neumaticos17),
                        s: cleanNum(row.Servicios)
                    };
                });
                // 2. Cargar Ventas
                Papa.parse(getUrl(GID_VENTAS), {
                    download: true, header: false,
                    complete: function(resVentas) {
                        rawVentas = resVentas.data;
                        const meses = [...new Set(rawVentas.map(r => r[14]))].filter(m => m && m !== "Mes");
                        const sel = document.getElementById('mesSelector');
                        sel.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
                        sel.addEventListener('change', render);
                        render();
                    }
                });
            }
        });
    }

    function render() {
        const mes = document.getElementById('mesSelector').value;
        const meta = metasMap[mes] || { f:0, n13:0, n17:0, s:0 };
        let real = { f:0, n13:0, n17:0, s:0 };

        rawVentas.forEach(row => {
            // Filtro por sucursal 88 (Beccar) y Mes
            if (String(row[0]).trim() === "88" && String(row[14]).trim() === mes) {
                const monto = cleanNum(row[6]);
                const cant = cleanNum(row[5]);
                const rodado = cleanNum(row[11]);
                real.f += monto;
                if (rodado >= 13) real.n13 += cant;
                if (rodado >= 17) real.n17 += cant;
                if (String(row[10]).trim() === "A_SERVICIO") real.s += monto;
            }
        });

        actualizarUI('f', real.f, meta.f, true);
        actualizarUI('n13', real.n13, meta.n13, false);
        actualizarUI('n17', real.n17, meta.n17, false);
        actualizarUI('s', real.s, meta.s, true);
    }

    function actualizarUI(id, v, o, money) {
        const diff = v - o;
        const pct = o > 0 ? Math.min((v/o)*100, 100) : 0;
        const fmt = (n) => money ? '$' + Math.floor(n).toLocaleString('es-AR') : Math.floor(n);
        
        document.getElementById(`${id}-val`).innerText = fmt(v);
        document.getElementById(`${id}-obj`).innerText = fmt(o);
        document.getElementById(`${id}-bar`).style.width = pct + '%';
        
        const dEl = document.getElementById(`${id}-diff`);
        dEl.innerText = fmt(Math.abs(diff));
        dEl.className = `tag ${diff >= 0 ? 'superado' : 'falta'}`;
    }

    // Modo Noche
    const btn = document.getElementById('theme-toggle');
    btn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        btn.innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    });

    cargarDatos();
</script>
</body>
</html>
