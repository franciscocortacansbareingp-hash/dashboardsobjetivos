<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard San Martín</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Variables de Luz */
        :root { 
            --bg: #f8fafc; 
            --card: #ffffff; 
            --primary: #0f172a; 
            --accent: #059669; 
            --text: #334155; 
            --muted: #64748b; 
            --border: #e2e8f0; 
            --blue-target: #1d4ed8; 
            --progress-bg: #f1f5f9;
        }

        /* Variables de Noche */
        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #f8fafc;
            --accent: #10b981;
            --text: #cbd5e1;
            --muted: #94a3b8;
            --border: #334155;
            --blue-target: #3b82f6;
            --progress-bg: #334155;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 30px 20px; 
            margin: 0; 
            transition: background 0.3s ease, color 0.3s ease; 
        }

        .container { max-width: 950px; margin: auto; }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
            padding-bottom: 15px; 
            border-bottom: 2px solid var(--border); 
        }

        .header h1 { 
            font-size: 1.7rem; 
            margin: 0; 
            font-weight: 800; 
            color: var(--primary); 
            letter-spacing: -0.02em; 
        }

        .controls { display: flex; gap: 10px; align-items: center; }

        select { 
            padding: 8px 16px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            font-size: 0.95rem; 
            font-weight: 600; 
            background: var(--card); 
            color: var(--primary); 
            cursor: pointer; 
        }

        /* Estilo del Botón Modo Noche */
        #theme-toggle {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--primary);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        #theme-toggle:hover { background: var(--border); }

        .metric-row { 
            background: var(--card); 
            border-radius: 14px; 
            border: 1px solid var(--border); 
            padding: 20px 25px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
            transition: transform 0.2s ease;
        }

        .row-main { display: grid; grid-template-columns: 1.8fr 1fr 1.2fr; align-items: center; gap: 10px; }
        .label { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .main-value { font-size: 1.9rem; font-weight: 800; color: var(--primary); margin-top: 4px; }
        .target-group { text-align: center; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        .target-value { font-size: 1.3rem; font-weight: 700; color: var(--muted); display: block; margin-top: 2px; }
        
        .diff-tag { font-size: 1.1rem; font-weight: 700; padding: 6px 14px; border-radius: 8px; display: inline-block; min-width: 145px; text-align: center; }
        .falta { color: var(--blue-target); background: rgba(29, 78, 216, 0.1); border: 1px solid var(--blue-target); }
        .superado { color: var(--accent); background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent); }

        .progress-bar-area { margin-top: 15px; display: flex; align-items: center; gap: 20px; }
        .progress-bg { flex-grow: 1; background: var(--progress-bg); height: 10px; border-radius: 10px; overflow: hidden; }
        .progress-fill { background: var(--accent); height: 100%; width: 0%; transition: width 1s ease; }
        .pct-label { font-size: 0.9rem; font-weight: 800; color: var(--primary); min-width: 45px; }
        .incidencia-tag { font-size: 0.8rem; font-weight: 700; color: #ffffff; background: var(--accent); padding: 3px 10px; border-radius: 6px; margin-left: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Dashboard San Martín</h1>
        <div class="controls">
            <button id="theme-toggle" title="Cambiar modo">🌓</button>
            <select id="mesSelector"><option>Cargando datos...</option></select>
        </div>
    </div>

    <div class="metric-row">
        <div class="row-main">
            <div><span class="label">Facturación Total</span><div id="f-val" class="main-value">$ 0,00</div></div>
            <div class="target-group"><span class="label">Objetivo</span><span id="f-obj" class="target-value">$ 0,00</span></div>
            <div style="text-align:right"><span id="f-diff-label" class="label">Desafío</span><br><div id="f-diff" class="diff-tag"></div></div>
        </div>
        <div class="progress-bar-area"><div class="progress-bg"><div id="f-bar" class="progress-fill"></div></div><span id="f-pct" class="pct-label">0%</span></div>
    </div>

    <div class="metric-row">
        <div class="row-main">
            <div><span class="label">Neumáticos 13"+</span><div id="n13-val" class="main-value">0</div></div>
            <div class="target-group"><span class="label">Objetivo</span><span id="n13-obj" class="target-value">0</span></div>
            <div style="text-align:right"><span id="n13-diff-label" class="label">Desafío</span><br><div id="n13-diff" class="diff-tag"></div></div>
        </div>
        <div class="progress-bar-area"><div class="progress-bg"><div id="n13-bar" class="progress-fill"></div></div><span id="n13-pct" class="pct-label">0%</span></div>
    </div>

    <div class="metric-row">
        <div class="row-main">
            <div><span class="label">Neumáticos 17"+</span><div id="n17-val" class="main-value">0</div></div>
            <div class="target-group"><span class="label">Objetivo</span><span id="n17-obj" class="target-value">0</span></div>
            <div style="text-align:right"><span id="n17-diff-label" class="label">Desafío</span><br><div id="n17-diff" class="diff-tag"></div></div>
        </div>
        <div class="progress-bar-area"><div class="progress-bg"><div id="n17-bar" class="progress-fill"></div></div><span id="n17-pct" class="pct-label">0%</span></div>
    </div>

    <div class="metric-row">
        <div class="row-main">
            <div><span class="label">Servicios <span id="i-val" class="incidencia-tag">0,00%</span></span><div id="s-val" class="main-value">$ 0,00</div></div>
            <div class="target-group"><span class="label">Objetivo</span><span id="s-obj" class="target-value">$ 0,00</span></div>
            <div style="text-align:right"><span id="s-diff-label" class="label">Desafío</span><br><div id="s-diff" class="diff-tag"></div></div>
        </div>
        <div class="progress-bar-area"><div class="progress-bg"><div id="s-bar" class="progress-fill"></div></div><span id="s-pct" class="pct-label">0%</span></div>
    </div>
</div>

<script>
    // --- LÓGICA DE MODO NOCHE ---
    const themeToggle = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme') || 'light';

    if (currentTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }

    themeToggle.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        if (theme === 'dark') {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        }
    });

    // --- LÓGICA DE DATOS ---
    const URL_PUB = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCmHe-75PjLOZxC8rj9ZiRx58SU0crBtp9FGokKFYUIN3FSONy7091EQPrVZWmHrkuXEuK-rg3uCx4/pub?output=csv';
    const GID_VENTAS = '0';
    const GID_OBJETIVOS = '1205656859'; 

    let rawVentas = [];
    let metasMap = {};

    function parseNum(v) {
        if (!v || v === "" || v === "-" || v === " ") return 0;
        let s = String(v).trim().replace(/[$\s]/g, '');
        if (s.includes(',') && s.includes('.')) {
            s = s.replace(/\./g, '').replace(',', '.');
        } else if (s.includes(',')) {
            s = s.replace(',', '.');
        }
        let n = parseFloat(s);
        return isNaN(n) ? 0 : n;
    }

    async function init() {
        Papa.parse(`${URL_PUB}&gid=${GID_OBJETIVOS}`, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                results.data.forEach(row => {
                    if (row["Mes"]) {
                        metasMap[row["Mes"].trim().toLowerCase()] = {
                            f: parseNum(row["Facturacion"]),
                            n13: parseNum(row["Neumaticos13"]),
                            n17: parseNum(row["Neumaticos17"]),
                            s: parseNum(row["Servicios"])
                        };
                    }
                });
                cargarVentas();
            }
        });
    }

    function cargarVentas() {
        Papa.parse(`${URL_PUB}&gid=${GID_VENTAS}`, {
            download: true, header: false, skipEmptyLines: true,
            complete: function(results) {
                rawVentas = results.data;
                const mesesRaw = rawVentas.map(r => String(r[14] || "").trim()).filter(m => m !== "" && m.toLowerCase() !== "mes");
                const mesesUnicos = [...new Set(mesesRaw)];
                
                const sel = document.getElementById('mesSelector');
                sel.innerHTML = mesesUnicos.map(m => `<option value="${m.toLowerCase()}">${m}</option>`).join('');
                sel.addEventListener('change', update);
                update();
            }
        });
    }

    function update() {
        const mesSel = document.getElementById('mesSelector').value.trim().toLowerCase();
        const meta = metasMap[mesSel] || { f: 0, n13: 0, n17: 0, s: 0 };
        let real = { f: 0, n13: 0, n17: 0, s: 0 };

        rawVentas.forEach((row, index) => {
            if (index === 0 || row.length < 15) return; 
            const suc = String(row[0] || "").trim().replace(/^0+/, ''); 
            const mesRow = String(row[14] || "").trim().toLowerCase();
            const act = String(row[8] || "").trim();

            if (suc === "99" && mesRow === mesSel && (act === "1" || act === "5")) {
                const imp = parseNum(row[6]);
                const cant = parseNum(row[5]);
                const rodText = String(row[11] || "").replace(/[^\d]/g, '');
                
                real.f += imp;
                if (rodText !== "") {
                    const rod = parseInt(rodText);
                    if (rod >= 13) real.n13 += cant;
                    if (rod >= 17) real.n17 += cant;
                }
                
                const rango = String(row[10] || "").trim().toUpperCase();
                if (rango === "A_SERVICIO") {
                    real.s += imp;
                }
            }
        });

        render('f', real.f, meta.f, true);
        render('n13', real.n13, meta.n13, false);
        render('n17', real.n17, meta.n17, false);
        render('s', real.s, meta.s, true);
        
        const inc = real.f > 0 ? (real.s / real.f * 100) : 0;
        document.getElementById('i-val').innerText = inc.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '%';
    }

    function render(id, val, target, isMoney) {
        const pct = target > 0 ? Math.round(val / target * 100) : 0;
        const diff = val - target;
        const fmt = (n) => n.toLocaleString('es-AR', { 
            useGrouping: true, 
            minimumFractionDigits: isMoney ? 2 : 0, 
            maximumFractionDigits: 2 
        });
        
        document.getElementById(`${id}-val`).innerText = isMoney ? '$ ' + fmt(val) : fmt(val);
        document.getElementById(`${id}-obj`).innerText = isMoney ? '$ ' + fmt(target) : fmt(target);
        document.getElementById(`${id}-bar`).style.width = Math.min(pct, 100) + '%';
        document.getElementById(`${id}-pct`).innerText = pct + '%';
        
        const dTag = document.getElementById(`${id}-diff`);
        const lTag = document.getElementById(`${id}-diff-label`);
        if (diff < 0) {
            lTag.innerText = "Desafío";
            dTag.className = 'diff-tag falta';
            dTag.innerText = isMoney ? '$ ' + fmt(Math.abs(diff)) : fmt(Math.abs(diff));
        } else {
            lTag.innerText = "¡Superado!";
            dTag.className = 'diff-tag superado';
            dTag.innerText = isMoney ? '+ $ ' + fmt(diff) : '+' + fmt(diff);
        }
    }
    init();
</script>
</body>
</html>
